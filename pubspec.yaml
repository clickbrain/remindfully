name: remindfully
description: Remindfully - A focus and mindfulness app with tap mechanics.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # PocketBase SDK
  pocketbase: ^0.18.0

  # State management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Local storage
  shared_preferences: ^2.2.2

  # Audio playback
  just_audio: ^0.9.36

  # UUID generation
  uuid: ^4.3.3

  # Navigation
  go_router: ^13.2.0

  # UI utilities
  cupertino_icons: ^1.0.6
  flutter_animate: ^4.5.0
  lottie: ^3.1.0

  # Utilities
  intl: ^0.19.0
  logger: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
    - assets/images/
